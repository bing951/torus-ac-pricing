
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特菱冷氣一對多搭配組合報價試算</title>
<style>
body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
}
.container{
max-width:1100px;
margin:auto;
}
.brand{
display:flex;
align-items:center;
gap:16px;
margin-bottom:25px;
}
.logo{
background:#e60012;
color:white;
font-weight:900;
font-size:28px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
}
.brand-text{
color:#e60012;
font-weight:900;
}
h1{
margin:5px 0 10px 0;
}
.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}
select,input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:14px;
}
.result{
background:#0f172a;
color:white;
padding:20px;
border-radius:12px;
font-size:26px;
font-weight:bold;
text-align:center;
}
.valid{
padding:10px;
border-radius:8px;
margin-top:10px;
}
.ok{background:#dcfce7;color:#166534;}
.bad{background:#fef3c7;color:#92400e;}
</style>
</head>
<body>

<div class="container">

<div class="brand">
<div class="logo">T</div>
<div>
<div class="brand-text" style="font-size:28px;">TORUS</div>
<div class="brand-text" style="font-size:20px;">特菱變頻冷氣</div>
</div>
</div>

<h1>特菱冷氣一對多搭配組合報價試算</h1>
<p>已套用每台單價扣 7,000 後價格，VF 配法同 HIX 配法。</p>

<div class="card">
<div class="grid">

<div>
<label>室外機</label>
<select id="outdoor"></select>
</div>

<div>
<label>室內機1</label>
<select id="indoor1"></select>
</div>

<div>
<label>室內機2</label>
<select id="indoor2"></select>
</div>

<div>
<label>室內機3</label>
<select id="indoor3"></select>
</div>

<div>
<label>室內機4</label>
<select id="indoor4"></select>
</div>

</div>
</div>

<div class="card">
<div id="type"></div>
<div id="sumIndoor"></div>
<div class="result" id="total"></div>
<div id="valid"></div>
</div>

</div>

<script>

const outdoorPrices={
"TRV-A562MX":21200,
"TRV-A692MX":28000,
"TRV-A843MX":34000,
"TRV-A1124MX":44900,
"TRV-A1424MX":49700
};

const indoorPrices={
"TRV-A28HIX":4300,"TRV-A36HIX":5000,"TRV-A41HIX":5800,"TRV-A50HIX":6600,
"TRV-A63HIX":9200,"TRV-A72HIX":9400,"TRV-A80HIX":10000,"TRV-D95HIX":12000,"TRV-D102HIX":12700,
"TRV-A28VF":6500,"TRV-A36VF":7900,"TRV-A41VF":9000,"TRV-A50VF":10000,
"TRV-A72VF":10500,"TRV-A80VF":11000,"TRV-A95VF":13000,"TRV-A102VF":13200
};

const validCombos={
"TRV-A562MX":[["TRV-A28HIX","TRV-A28HIX"],["TRV-A28HIX","TRV-A36HIX"]],
"TRV-A692MX":[["TRV-A28HIX","TRV-A41HIX"],["TRV-A28HIX","TRV-A50HIX"],["TRV-A36HIX","TRV-A36HIX"],["TRV-A36HIX","TRV-A41HIX"]]
};

const outdoor=document.getElementById("outdoor");
const selects=["indoor1","indoor2","indoor3","indoor4"].map(id=>document.getElementById(id));

function fillSelect(sel,data){
sel.innerHTML='<option value="">不選擇</option>';
Object.keys(data).forEach(m=>{
const o=document.createElement("option");
o.value=m;
o.text=m+" ("+data[m]+")";
sel.appendChild(o);
});
}

fillSelect(outdoor,outdoorPrices);
selects.forEach(s=>fillSelect(s,indoorPrices));

function normalize(m){return m.replace("VF","HIX");}

function checkValid(out,combo){
if(combo.length<2) return null;
let base=combo.map(normalize).sort().join("|");
return (validCombos[out]||[]).some(c=>c.map(normalize).sort().join("|")==base);
}

function calc(){

let out=outdoor.value;
let combo=selects.map(s=>s.value).filter(v=>v);

let indoorSum=combo.reduce((a,b)=>a+(indoorPrices[b]||0),0);
let total=(outdoorPrices[out]||0)+indoorSum;

document.getElementById("type").innerText="搭配型式: 一對"+combo.length;
document.getElementById("sumIndoor").innerText="室內機合計: "+indoorSum;
document.getElementById("total").innerText="整組總價 "+total;

let valid=checkValid(out,combo);
let v=document.getElementById("valid");

if(valid===true){
v.className="valid ok";
v.innerText="此組合為合法配法";
}else if(valid===false){
v.className="valid bad";
v.innerText="此組合為非合法配法";
}else{
v.innerText="請至少選擇2台室內機";
}

}

[outdoor,...selects].forEach(el=>el.addEventListener("change",calc));

calc();

</script>

</body>
</html>
